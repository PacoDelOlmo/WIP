name: Validaciones de Pull Request


on: [pull_request]

jobs:
  backend-tests:
    name: Backend Tests (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./WIP_Backend

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permisos de ejecución a Maven Wrapper
        run: chmod +x ./mvnw

      - name: Ejecutar Tests de Spring Boot
        run: ./mvnw test

  frontend-tests:
    name: Frontend Tests (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./WorkInProgress_front

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: './WorkInProgress_front/pnpm-lock.yaml'

      - name: Instalar dependencias con pnpm
        run: pnpm install --frozen-lockfile

      - name: Ejecutar Tests de Vitest
        run: pnpm run test